<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Links</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>
  <main class="page">
    <header class="profile">
      <img class="profile__avatar" src="avatar.png" alt="Сергей Кламбоцкий">
      <h1 class="profile__name">Сергей Кламбоцкий</h1>
      <p class="profile__bio">Исследую себя, человеков и технологии через творчество, дизайн, движение и рефлексию. Маркетолог, креатор, философ.</p>
    </header>

    <nav class="links">
      <a class="link-card" href="https://right.by/" target="_blank" rel="noopener">
        <span class="link-card__label">Студия Райт</span>
        <span class="link-card__desc">Руководитель маркетинга</span>
      </a>
      <a class="link-card" href="https://t.me/mac_of_the_day_bot/" target="_blank" rel="noopener">
        <span class="link-card__label">Бот метафорических карт</span>
        <span class="link-card__desc">Автор проекта</span>
      </a>
      <a class="link-card" href="https://t.me/running_me" target="_blank" rel="noopener">
        <span class="link-card__label">Блог</span>
        <span class="link-card__desc">Для своих</span>
      </a>
    </nav>

    <footer class="footer">
      <p>Сделано своими руками</p>
    </footer>
  </main>
</body>
</html>
