<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Links</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>
  <main class="page">
    <header class="profile">
      <div class="profile__avatar" aria-hidden="true"></div>
      <h1 class="profile__name">Твоё имя</h1>
      <p class="profile__bio">Кратко о себе: чем занимаешься, что важно. Одна-две фразы.</p>
    </header>

    <nav class="links">
      <a class="link-card" href="https://github.com" target="_blank" rel="noopener">
        <span class="link-card__label">GitHub</span>
        <span class="link-card__desc">Проекты и код</span>
      </a>
      <a class="link-card" href="https://t.me" target="_blank" rel="noopener">
        <span class="link-card__label">Telegram</span>
        <span class="link-card__desc">Написать мне</span>
      </a>
      <a class="link-card" href="https://linkedin.com" target="_blank" rel="noopener">
        <span class="link-card__label">LinkedIn</span>
        <span class="link-card__desc">Профиль</span>
      </a>
      <a class="link-card" href="#" target="_blank" rel="noopener">
        <span class="link-card__label">Портфолио / проект</span>
        <span class="link-card__desc">Описание</span>
      </a>
    </nav>

    <footer class="footer">
      <p>Сделано своими руками</p>
    </footer>
  </main>
</body>
</html>
